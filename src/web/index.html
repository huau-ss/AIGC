<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>学术改写 - 降 AIGC</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --card-bg: #ffffff;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --border-color: #e5e7eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      padding: 16px;
      padding-bottom: 100px;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      color: white;
      margin-bottom: 24px;
      padding: 20px 0;
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    /* Tab Bar */
    .tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.15);
      padding: 6px;
      border-radius: 16px;
    }

    .tab-item {
      flex: 1;
      padding: 12px 8px;
      background: transparent;
      border: none;
      border-radius: 12px;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    .tab-item.active {
      background: white;
      color: var(--primary);
    }

    /* Card */
    .card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title svg {
      width: 20px;
      height: 20px;
      color: var(--primary);
    }

    /* Upload Area */
    .upload-area {
      border: 2px dashed var(--border-color);
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: #f9fafb;
    }

    .upload-area:active, .upload-area.dragover {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
    }

    .upload-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      color: var(--primary);
    }

    .upload-text {
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .upload-hint {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    /* File Preview */
    .file-preview {
      display: none;
      background: #f3f4f6;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .file-preview.show {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .file-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .file-remove {
      width: 32px;
      height: 32px;
      border: none;
      background: #fee2e2;
      color: var(--danger);
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
    }

    /* Textarea */
    textarea {
      width: 100%;
      height: 160px;
      padding: 16px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 1rem;
      line-height: 1.6;
      resize: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    textarea::placeholder {
      color: #9ca3af;
    }

    /* Options */
    .options-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .option-btn {
      padding: 8px 16px;
      border: 2px solid var(--border-color);
      border-radius: 20px;
      background: white;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .option-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* Form */
    .form-group {
      margin-top: 16px;
    }

    .form-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: block;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Button */
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--bg-gradient);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Result */
    .result-area {
      display: none;
    }

    .result-area.show {
      display: block;
    }

    .result-text {
      background: #f9fafb;
      border-radius: 12px;
      padding: 16px;
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
    }

    .result-meta {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .meta-tag {
      background: #e0e7ff;
      color: var(--primary-dark);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .result-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn-action {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-copy {
      background: var(--primary);
      color: white;
    }

    .btn-download {
      background: #10b981;
      color: white;
    }

    /* Loading */
    .loading-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .loading-mask.show {
      display: flex;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      color: white;
      font-size: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* History */
    .history-item {
      background: #f9fafb;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .history-time {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .history-preview {
      font-size: 0.9rem;
      color: var(--text-primary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .history-original {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Batch Panel */
    .batch-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .batch-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 12px;
      margin-bottom: 8px;
    }

    .batch-num {
      width: 24px;
      height: 24px;
      background: var(--primary);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    .batch-text {
      flex: 1;
      font-size: 0.9rem;
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1001;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Tab Content */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Safe area */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      body {
        padding-bottom: calc(100px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>学术改写</h1>
      <p>降低论文 AIGC 检测率</p>
    </header>

    <nav class="tab-bar">
      <button class="tab-item active" data-tab="rewrite">改写</button>
      <button class="tab-item" data-tab="batch">批量</button>
      <button class="tab-item" data-tab="history">历史</button>
    </nav>

    <!-- 改写 Tab -->
    <div class="tab-content active" id="tab-rewrite">
      <div class="card">
        <div class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          上传文档
        </div>
        
        <div class="upload-area" id="uploadArea">
          <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <div class="upload-text">点击或拖拽上传 Word 文档</div>
          <div class="upload-hint">支持 .docx 格式</div>
          <input type="file" id="fileInput" accept=".docx" style="display:none;">
        </div>

        <div class="file-preview" id="filePreview">
          <div class="file-icon">DOC</div>
          <div class="file-info">
            <div class="file-name" id="fileName">document.docx</div>
            <div class="file-size" id="fileSize">0 KB</div>
          </div>
          <button class="file-remove" id="fileRemove">&times;</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="17" y1="10" x2="3" y2="10"></line>
            <line x1="21" y1="6" x2="3" y2="6"></line>
            <line x1="21" y1="14" x2="3" y2="14"></line>
            <line x1="17" y1="18" x2="3" y2="18"></line>
          </svg>
          或直接输入文本
        </div>
        <textarea id="inputText" placeholder="在此粘贴需要改写的学术文本..."></textarea>

        <div class="options-row">
          <button class="option-btn" data-level="light">轻度</button>
          <button class="option-btn active" data-level="medium">中度</button>
          <button class="option-btn" data-level="deep">深度</button>
        </div>

        <div class="form-group">
          <label class="form-label">保留术语（用逗号分隔，可选）</label>
          <input type="text" class="form-input" id="preserveTerms" placeholder="例如：ResNet, 准确率">
        </div>
      </div>

      <button class="btn-primary" id="rewriteBtn">开始改写</button>

      <div class="card result-area" id="resultArea">
        <div class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          改写结果
        </div>
        <div class="result-text" id="resultText"></div>
        <div class="result-meta" id="resultMeta"></div>
        <div class="result-actions">
          <button class="btn-action btn-copy" id="copyBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            复制
          </button>
          <button class="btn-action btn-download" id="downloadBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            下载
          </button>
        </div>
      </div>
    </div>

    <!-- 批量 Tab -->
    <div class="tab-content" id="tab-batch">
      <div class="card">
        <div class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="9" y1="21" x2="9" y2="9"></line>
          </svg>
          批量文本列表
        </div>

        <textarea id="batchInput" placeholder="每行一段文本..." style="height: 120px;"></textarea>
        <button class="btn-primary" id="addBatchBtn" style="background: #10b981; margin-top: 12px;">添加文本</button>

        <div class="batch-list" id="batchList"></div>
      </div>

      <div class="card">
        <div class="options-row">
          <button class="option-btn" data-batch-level="light">轻度</button>
          <button class="option-btn active" data-batch-level="medium">中度</button>
          <button class="option-btn" data-batch-level="deep">深度</button>
        </div>
      </div>

      <button class="btn-primary" id="batchRewriteBtn" disabled>开始批量改写</button>

      <div class="card result-area" id="batchResultArea">
        <div class="card-title">批量结果</div>
        <div id="batchResultList"></div>
      </div>
    </div>

    <!-- 历史 Tab -->
    <div class="tab-content" id="tab-history">
      <div class="card" id="historyEmpty">
        <div style="text-align: center; padding: 40px 20px; color: var(--text-secondary);">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom: 12px; opacity: 0.5;">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          <p>暂无历史记录</p>
        </div>
      </div>
      <div id="historyList"></div>
    </div>
  </div>

  <div class="loading-mask" id="loadingMask">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在改写，请稍候...</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // API 配置
    const API_BASE = window.ENV_API_URL || '';

    // State
    let currentLevel = 'medium';
    let batchLevel = 'medium';
    let batchTexts = [];
    let currentResult = '';
    let history = JSON.parse(localStorage.getItem('rewriteHistory') || '[]');
    let isUploading = false;

    // Tab switching
    document.querySelectorAll('.tab-item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // File upload
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const filePreview = document.getElementById('filePreview');

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', async (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) await handleFile(file);
    });

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (file) await handleFile(file);
    });

    document.getElementById('fileRemove').addEventListener('click', () => {
      filePreview.classList.remove('show');
      fileInput.value = '';
      document.getElementById('inputText').value = '';
    });

    async function handleFile(file) {
      if (!file.name.endsWith('.docx')) {
        showToast('请上传 .docx 格式的文件');
        return;
      }

      document.getElementById('fileName').textContent = file.name;
      document.getElementById('fileSize').textContent = (file.size / 1024).toFixed(1) + ' KB';
      filePreview.classList.add('show');

      isUploading = true;
      const formData = new FormData();
      formData.append('file', file);

      try {
        const response = await fetch(API_BASE + '/api/upload', {
          method: 'POST',
          body: formData
        });
        const data = await response.json();
        if (data.success) {
          document.getElementById('inputText').value = data.text;
          showToast('文档解析成功');
        } else {
          showToast('解析失败: ' + data.error);
        }
      } catch (error) {
        showToast('网络错误');
      } finally {
        isUploading = false;
      }
    }

    // Level selection
    document.querySelectorAll('#tab-rewrite .option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#tab-rewrite .option-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLevel = btn.dataset.level;
      });
    });

    document.querySelectorAll('[data-batch-level]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-batch-level]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        batchLevel = btn.dataset.batchLevel;
      });
    });

    // Rewrite
    document.getElementById('rewriteBtn').addEventListener('click', async () => {
      if (isUploading) {
        showToast('文档正在上传中，请稍候...');
        return;
      }

      const text = document.getElementById('inputText').value.trim();
      if (!text) {
        showToast('请输入或上传文本');
        return;
      }

      const preserveTerms = document.getElementById('preserveTerms').value.split(',').map(t => t.trim()).filter(t => t);

      showLoading(true);

      try {
        const response = await fetch(API_BASE + '/api/rewrite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, level: currentLevel, preserveTerms })
        });

        const data = await response.json();

        if (data.success) {
          const result = data.data;
          currentResult = result.rewritten;

          document.getElementById('resultText').textContent = result.rewritten;
          document.getElementById('resultMeta').innerHTML = `
            <span class="meta-tag">${currentLevel === 'light' ? '轻度' : currentLevel === 'medium' ? '中度' : '深度'}改写</span>
          `;
          document.getElementById('resultArea').classList.add('show');

          // Save to history
          saveHistory(text, result.rewritten, currentLevel);
        } else {
          showToast('改写失败: ' + data.error);
        }
      } catch (error) {
        showToast('网络错误');
      } finally {
        showLoading(false);
      }
    });

    // Copy & Download
    document.getElementById('copyBtn').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(currentResult);
        showToast('已复制到剪贴板');
      } catch {
        showToast('复制失败');
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const blob = new Blob([currentResult], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '改写结果.txt';
      a.click();
      URL.revokeObjectURL(url);
    });

    // Batch
    document.getElementById('addBatchBtn').addEventListener('click', () => {
      const lines = document.getElementById('batchInput').value.split('\n').map(l => l.trim()).filter(l => l);
      lines.forEach(text => {
        if (!batchTexts.includes(text)) {
          batchTexts.push(text);
        }
      });
      document.getElementById('batchInput').value = '';
      renderBatchList();
    });

    function renderBatchList() {
      const list = document.getElementById('batchList');
      if (batchTexts.length === 0) {
        list.innerHTML = '';
        document.getElementById('batchRewriteBtn').disabled = true;
        return;
      }

      list.innerHTML = batchTexts.map((text, i) => `
        <div class="batch-item">
          <div class="batch-num">${i + 1}</div>
          <div class="batch-text">${text.slice(0, 50)}${text.length > 50 ? '...' : ''}</div>
          <button onclick="removeBatch(${i})" style="background:none;border:none;color:#ef4444;font-size:1.2rem;cursor:pointer;">&times;</button>
        </div>
      `).join('');

      document.getElementById('batchRewriteBtn').disabled = false;
    }

    window.removeBatch = (index) => {
      batchTexts.splice(index, 1);
      renderBatchList();
    };

    document.getElementById('batchRewriteBtn').addEventListener('click', async () => {
      if (batchTexts.length === 0) return;

      showLoading(true);

      try {
        const response = await fetch(API_BASE + '/api/rewrite/batch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ texts: batchTexts, level: batchLevel })
        });

        const data = await response.json();

        if (data.success) {
          const results = data.data;
          document.getElementById('batchResultList').innerHTML = results.map((r, i) => `
            <div class="history-item">
              <div class="history-header">
                <span style="font-weight:500;">#${i + 1}</span>
              </div>
              <div class="history-preview">${r.rewritten}</div>
            </div>
          `).join('');
          document.getElementById('batchResultArea').classList.add('show');
        } else {
          showToast('批量改写失败');
        }
      } catch (error) {
        showToast('网络错误');
      } finally {
        showLoading(false);
      }
    });

    // History
    function saveHistory(original, rewritten, level) {
      const item = {
        id: Date.now(),
        original,
        rewritten,
        level,
        time: new Date().toLocaleString('zh-CN')
      };
      history.unshift(item);
      history = history.slice(0, 50);
      localStorage.setItem('rewriteHistory', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const empty = document.getElementById('historyEmpty');
      const list = document.getElementById('historyList');

      if (history.length === 0) {
        empty.style.display = 'block';
        list.innerHTML = '';
        return;
      }

      empty.style.display = 'none';
      list.innerHTML = history.map(item => `
        <div class="history-item">
          <div class="history-header">
            <span class="meta-tag">${item.level === 'light' ? '轻度' : item.level === 'medium' ? '中度' : '深度'}</span>
            <span class="history-time">${item.time}</span>
          </div>
          <div class="history-original">原文: ${item.original.slice(0, 100)}${item.original.length > 100 ? '...' : ''}</div>
          <div class="history-preview">${item.rewritten.slice(0, 100)}${item.rewritten.length > 100 ? '...' : ''}</div>
        </div>
      `).join('');
    }

    renderHistory();

    // Utils
    function showLoading(show) {
      document.getElementById('loadingMask').classList.toggle('show', show);
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
